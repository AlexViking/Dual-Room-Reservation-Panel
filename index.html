<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dual Room Reservation Panel</title>
    
    <link rel="icon" type="image/svg+xml" href="door-open.svg">
    <link rel="apple-touch-icon" href="door-open.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* Rigid Root Container to lock viewport exactly inside visible boundaries */
        html, body {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* Primary Grid Layout Frame:
           Calculates bottom height using a hard-coded subtract variable 
           to pull all UI targets up away from the Android system bar frame. */
        .columns-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            /* Hard stop safe calculation clearing the physical native navigation taskbar */
            bottom: calc(64px + env(safe-area-inset-bottom, 0px)); 
            display: flex;
            flex-direction: row;
        }

        .room-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            /* Uniform safe vertical content compression padding */
            padding: 40px 24px; 
            transition: background-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        #room1-col {
            border-right: 2px solid rgba(0, 0, 0, 0.05);
        }

        /* Vector Icon Alignment */
        .room-header {
            text-align: center;
            width: 100%;
        }
        .icon-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .room-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 2px;
        }
        .room-subtitle {
            font-size: 0.9rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Status Blocks Display */
        .status-block {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }
        .status-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }
        .status-state {
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            line-height: 1;
        }
        .timer-wrapper {
            margin-top: 8px;
        }
        .timer-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 2px;
        }
        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            color: #0f172a;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        /* Fixed Width Action Panels */
        .controls-container {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Tactile Touch Elements */
        .btn {
            width: 100%;
            font-size: 1.35rem;
            font-weight: 800;
            padding: 14px 0;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 60ms ease;
        }
        .btn:active {
            transform: scale(0.96);
        }

        /* UI Theme Color Grids */
        .bg-available { background-color: #e6f9f0; }
        .text-available { color: #00a35c; }
        .btn-green-main { background-color: #00a35c; color: #ffffff; }
        .btn-green-sub { background-color: #00c46f; color: #ffffff; }

        .bg-occupied { background-color: #ffebe6; }
        .text-occupied { color: #e11d48; }
        .btn-red-action { background-color: #ff3333; color: #ffffff; }
        .btn-neutral-clear { 
            background-color: #e2e8f0; 
            color: #334155; 
            border: 1px solid #cbd5e1;
            font-size: 1.25rem;
        }

        /* ================= HUD PREMIUM TOGGLE CONTROLLER ================= */
        .fullscreen-trigger-zone {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }
        
        .toggle-container {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            transition: all 200ms ease;
        }
        .toggle-container:active {
            transform: scale(0.97);
        }

        .toggle-status-ring {
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            transition: all 400ms ease;
            box-shadow: 0 0 10px #ff3333;
            animation: pulse-glow 2s infinite alternate;
        }

        .toggle-text {
            color: rgba(243, 244, 246, 0.9);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .is-fullscreen .toggle-status-ring {
            background-color: #00c46f;
            box-shadow: 0 0 10px #00c46f;
        }
        .is-fullscreen .toggle-container {
            border-color: rgba(0, 196, 111, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }

        @keyframes pulse-glow {
            0% { opacity: 0.6; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="fullscreen-trigger-zone" id="fullscreenToggle">
        <div class="toggle-container" onclick="toggleFullscreen()">
            <div class="toggle-status-ring"></div>
            <span class="toggle-text">Fullscreen Mode</span>
        </div>
    </div>

    <div class="columns-wrapper">
        <div id="room1-col" class="room-column bg-available">
            <div class="room-header">
                <div id="room1-icon" class="icon-container"></div>
                <h1 class="room-title">Conference Room A</h1>
                <h2 class="room-subtitle">Room A</h2>
            </div>

            <div class="status-block">
                <div class="status-label">Status:</div>
                <div id="room1-status" class="status-state text-available">Free</div>
                <div id="room1-timer-container" class="timer-wrapper hidden">
                    <div class="timer-label">Time Remaining:</div>
                    <div id="room1-timer" class="timer-display">00:00</div>
                </div>
            </div>

            <div class="controls-container">
                <div id="room1-available-ctrls" class="controls-container">
                    <button onclick="bookRoom('room1', 60)" class="btn btn-green-main">+ 1 Hr</button>
                    <button onclick="bookRoom('room1', 30)" class="btn btn-green-sub">+ 30 Min</button>
                </div>
                <div id="room1-occupied-ctrls" class="controls-container hidden">
                    <button onclick="clearRoom('room1')" class="btn btn-neutral-clear">End Meeting Early</button>
                    <button onclick="bookRoom('room1', 15)" class="btn btn-red-action">+ 15 Min</button>
                </div>
            </div>
        </div>

        <div id="room2-col" class="room-column bg-available">
            <div class="room-header">
                <div id="room2-icon" class="icon-container"></div>
                <h1 class="room-title">Conference Room B</h1>
                <h2 class="room-subtitle">Room B</h2>
            </div>

            <div class="status-block">
                <div class="status-label">Status:</div>
                <div id="room2-status" class="status-state text-available">Free</div>
                <div id="room2-timer-container" class="timer-wrapper hidden">
                    <div class="timer-label">Time Remaining:</div>
                    <div id="room2-timer" class="timer-display">00:00</div>
                </div>
            </div>

            <div class="controls-container">
                <div id="room2-available-ctrls" class="controls-container">
                    <button onclick="bookRoom('room2', 60)" class="btn btn-green-main">+ 1 Hr</button>
                    <button onclick="bookRoom('room2', 30)" class="btn btn-green-sub">+ 30 Min</button>
                </div>
                <div id="room2-occupied-ctrls" class="controls-container hidden">
                    <button onclick="clearRoom('room2')" class="btn btn-neutral-clear">End Meeting Early</button>
                    <button onclick="bookRoom('room2', 15)" class="btn btn-red-action">+ 15 Min</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const openDoorImage = `<img src="door-open.svg" alt="Available">`;
        const occupiedDoorImage = `<img src="door-occupied.svg" alt="Occupied">`;

        let currentRoomStates = {
            room1: null,
            room2: null
        };

        function toggleFullscreen() {
            const toggleElement = document.getElementById('fullscreenToggle');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen()
                    .then(() => { toggleElement.classList.add('is-fullscreen'); })
                    .catch(err => { console.log(`Error: ${err.message}`); });
            } else {
                document.exitFullscreen();
                toggleElement.classList.remove('is-fullscreen');
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const toggleElement = document.getElementById('fullscreenToggle');
            if (!document.fullscreenElement) {
                toggleElement.classList.remove('is-fullscreen');
            } else {
                toggleElement.classList.add('is-fullscreen');
            }
        });

        function getEndTime(room) {
            const val = localStorage.getItem(`${room}_endTime`);
            return val ? parseInt(val) : null;
        }

        function bookRoom(room, minutes) {
            const now = Date.now();
            let endTime = getEndTime(room);
            if (endTime && endTime > now) {
                endTime += minutes * 60 * 1000;
            } else {
                endTime = now + (minutes * 60 * 1000);
            }
            localStorage.setItem(`${room}_endTime`, endTime);
            updateUI();
        }

        function clearRoom(room) {
            localStorage.removeItem(`${room}_endTime`);
            updateUI();
        }

        function updateRoomDisplay(room) {
            const now = Date.now();
            const endTime = getEndTime(room);
            
            const col = document.getElementById(`${room}-col`);
            const iconWrap = document.getElementById(`${room}-icon`);
            const statusText = document.getElementById(`${room}-status`);
            const timerContainer = document.getElementById(`${room}-timer-container`);
            const timerDisplay = document.getElementById(`${room}-timer`);
            const availCtrls = document.getElementById(`${room}-available-ctrls`);
            const occCtrls = document.getElementById(`${room}-occupied-ctrls`);

            const isOccupied = endTime && endTime > now;
            const targetState = isOccupied ? 'occupied' : 'free';

            if (isOccupied) {
                const diff = endTime - now;
                const totalSecs = Math.ceil(diff / 1000);
                const mins = Math.floor(totalSecs / 60);
                const secs = totalSecs % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            if (currentRoomStates[room] !== targetState) {
                currentRoomStates[room] = targetState;

                if (targetState === 'occupied') {
                    col.className = "room-column bg-occupied";
                    iconWrap.innerHTML = occupiedDoorImage;
                    
                    statusText.innerText = "Occupied";
                    statusText.className = "status-state text-occupied";
                    
                    timerContainer.classList.remove('hidden');
                    availCtrls.classList.add('hidden');
                    occCtrls.classList.remove('hidden');
                } else {
                    col.className = "room-column bg-available";
                    iconWrap.innerHTML = openDoorImage;
                    
                    statusText.innerText = "Free";
                    statusText.className = "status-state text-available";
                    
                    timerContainer.classList.add('hidden');
                    availCtrls.classList.remove('hidden');
                    occCtrls.classList.add('hidden');
                    
                    if (endTime) localStorage.removeItem(`${room}_endTime`); 
                }
            }
        }

        function updateUI() {
            updateRoomDisplay('room1');
            updateRoomDisplay('room2');
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
